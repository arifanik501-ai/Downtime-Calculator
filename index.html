<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#e8d5ff">
  <title>Downtime Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <div class="ambient ambient-one" aria-hidden="true"></div>
    <div class="ambient ambient-two" aria-hidden="true"></div>
    <div class="ambient ambient-three" aria-hidden="true"></div>
    <div class="ambient ambient-four" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>

    <header class="app-header">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" width="22" height="22" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="brandGradient" x1="2" y1="2" x2="30" y2="30" gradientUnits="userSpaceOnUse">
                <stop offset="0" stop-color="#8E7CFF"/>
                <stop offset="1" stop-color="#FF85BA"/>
              </linearGradient>
            </defs>
            <circle cx="16" cy="16" r="13" stroke="url(#brandGradient)" stroke-width="2.4"/>
            <path d="M16 8.5V16L21 19" stroke="url(#brandGradient)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="16" cy="16" r="1.6" fill="url(#brandGradient)"/>
          </svg>
        </span>
        <div class="brand-copy">
          <h1>Downtime <em>Calculator</em></h1>
        </div>
      </div>
    </header>

    <main class="content" aria-live="polite">
      <section class="glass-card input-card" aria-labelledby="calculator-title">
        <h2 id="calculator-title" class="sr-only">Downtime calculator inputs</h2>

        <div class="field-group" data-field="target">
          <label for="target"><span>01</span>Production Target</label>
          <div class="input-shell">
            <input id="target" type="number" inputmode="numeric" min="0" step="1" placeholder="Enter target units" autocomplete="off">
            <span class="input-unit">units</span>
          </div>
          <p class="error-message" id="target-error"></p>
        </div>

        <div class="field-group" data-field="achievement">
          <label for="achievement"><span>02</span>Production Achievement</label>
          <div class="input-shell">
            <input id="achievement" type="number" inputmode="numeric" min="0" step="1" placeholder="Enter achieved units" autocomplete="off">
            <span class="input-unit">units</span>
          </div>
          <p class="error-message" id="achievement-error"></p>
        </div>

        <div class="field-group runtime-field">
          <span class="field-label"><span>03</span>Production Runtime</span>
          <div class="runtime-options" role="radiogroup" aria-label="Production Runtime">
            <button class="runtime-pill is-active" type="button" role="radio" aria-checked="true" data-runtime="480"><strong>480</strong><small>min</small></button>
            <button class="runtime-pill" type="button" role="radio" aria-checked="false" data-runtime="660"><strong>660</strong><small>min</small></button>
            <button class="runtime-pill" type="button" role="radio" aria-checked="false" data-runtime="780"><strong>780</strong><small>min</small></button>
          </div>
        </div>

        <div class="field-group downtime-field">
          <span class="field-label"><span>04</span>Additional Downtime</span>
          <div class="fixed-downtime" aria-label="Additional downtime fixed value">
            <span class="fixed-value">30 min</span>
            <span class="fixed-caption">Fixed buffer</span>
          </div>
        </div>
      </section>

      <button class="calculate-button" type="button" id="calculate">
        <span class="button-shine" aria-hidden="true"></span>
        <span class="button-text">Calculate Downtime</span>
        <span class="button-arrow" aria-hidden="true">
          <svg viewBox="0 0 20 20" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 10h12M11 5l5 5-5 5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="spinner" aria-hidden="true"></span>
      </button>

      <section class="glass-card result-card is-empty" id="result-card" aria-live="polite">
        <div class="result-glow" aria-hidden="true"></div>
        <div class="empty-state" id="empty-state">
          <div class="calculator-icon" aria-hidden="true">
            <svg viewBox="0 0 48 48" width="32" height="32" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="9" y="6" width="30" height="36" rx="6" stroke="currentColor" stroke-width="2.2"/>
              <rect x="14" y="11" width="20" height="8" rx="2.5" stroke="currentColor" stroke-width="1.8"/>
              <circle cx="16.5" cy="26" r="1.7" fill="currentColor"/>
              <circle cx="24" cy="26" r="1.7" fill="currentColor"/>
              <circle cx="31.5" cy="26" r="1.7" fill="currentColor"/>
              <circle cx="16.5" cy="32" r="1.7" fill="currentColor"/>
              <circle cx="24" cy="32" r="1.7" fill="currentColor"/>
              <rect x="29.6" y="30.3" width="3.4" height="7" rx="1.4" fill="currentColor"/>
              <circle cx="16.5" cy="38" r="1.7" fill="currentColor"/>
              <circle cx="24" cy="38" r="1.7" fill="currentColor"/>
            </svg>
          </div>
          <p>Enter values to calculate</p>
        </div>

        <div class="result-content" id="result-content">
          <p class="result-label">Total Downtime</p>
          <div class="result-ring" aria-hidden="true">
            <p class="result-value"><span id="result-number">0</span><span class="result-unit">min</span></p>
          </div>
          <p class="formula" id="formula">Runtime - (Achievement/Target × Runtime) + 30</p>
        </div>
      </section>
    </main>

    <div class="safe-area" aria-hidden="true"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
